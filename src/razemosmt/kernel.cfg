# kernel.cfg — linker config for razemOSmt kernel
#
# Memory layout:
#   $0200–$025F  JUMPTABLE  (96B  — 32 JMP abs vectors)
#   $0260–$0A5F  KERNEL     (2048B — IRQ handler, scheduler, syscall)
#   $0A60–$0B5F  KCODE ext  (expanded to $0A00 = 2560B total for ria_api.s)
#   $0C60–$0D5F  KDATA      (256B  — kernel variables)
#   $0D60–$0E5F  TCBAREA    (256B  — 4 x 64B Task Control Blocks)
#
# Kernel ZP: $001A–$0027 (14B) — used directly in ASM, outside linker control

SYMBOLS {
    __STARTADDR__: type = weak, value = $0200;
}

MEMORY {
    # ZP: from $0028 (above kernel KZP $001A–$0027 and cc65 ZP $0000–$0019)
    ZP:      file = "",  define = yes, start = $0028, size = $00D8;

    # Jump table: $0200–$025F (96 bytes)
    JTABLE:  file = %O, define = yes, start = $0200, size = $0060;

    # Kernel code: $0260–$0C5F (2560 bytes — kernel.s + ria_api.s CODE)
    KCODE:   file = %O, define = yes, start = $0260, size = $0A00;

    # Kernel data: $0C60–$0D5F (256 bytes)
    KDATA:   file = %O, define = yes, start = $0C60, size = $0100;

    # Task Control Blocks: $0D60–$0E5F (256 bytes = 4 x 64B)
    TCBAREA: file = %O, define = yes, start = $0D60, size = $0100;
}

SEGMENTS {
    ZEROPAGE:  load = ZP,      type = zp;
    JUMPTABLE: load = JTABLE,  type = ro;
    KERNEL:    load = KCODE,   type = ro;
    CODE:      load = KCODE,   type = ro;   # ria_api.s uses CODE segment
    RODATA:    load = KCODE,   type = ro,   optional = yes;
    DATA:      load = KCODE,   type = rw,   optional = yes;
    BSS:       load = KCODE,   type = bss,  optional = yes;
    KDATA:     load = KDATA,   type = rw;
    TCBAREA:   load = TCBAREA, type = rw;
}
