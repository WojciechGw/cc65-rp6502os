# shell.cfg — linker config for razemOSmt shell (TASK0)
#
# TASK0 starts at $0E60 (right after kernel area $0200–$0E5F)
# Hardware stack PAGE1 TASK0 partition: $0100–$013F (64 bytes)
# ZP: $0028+ (above kernel KZP $001A–$0027 and cc65 ZP $0000–$0019)
#
# IMPORTANT: shell compiled with this cfg must work with the razemOSmt kernel.
# Do not use ZP addresses $001A–$0027 — reserved for kernel.

SYMBOLS {
    __STARTADDR__: type = weak, value = $0E60;
    __STARTUP__:   type = import;
    __STACKSIZE__: type = weak, value = $0200;
}

MEMORY {
    ZP:       file = "",  define = yes, start = $0028, size = $00D8;
    CPUSTACK: file = "",               start = $0100, size = $0040;
    RAM:      file = %O, define = yes, start = __STARTADDR__,
                                       size = $A000 - __STACKSIZE__ - __STARTADDR__;
    # TASK0 RAM: $0E60–$9DFF (~35.5 KB available for shell/razemos)
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    STARTUP:  load = RAM,    type = ro;
    LOWCODE:  load = RAM,    type = ro,  optional = yes;
    ONCE:     load = RAM,    type = ro,  optional = yes;
    CODE:     load = RAM,    type = ro;
    RODATA:   load = RAM,    type = ro;
    DATA:     load = RAM,    type = rw,  define   = yes;
    BSS:      load = RAM,    type = bss, define   = yes;
}

FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
