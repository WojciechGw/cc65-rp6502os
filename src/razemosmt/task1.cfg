# task1.cfg — linker config for TASK1 in razemOSmt
#
# TASK1 starts at $A000
# Hardware stack PAGE1 TASK1 partition: $0140–$017F (64 bytes, SP init $7F)
# ZP: $0028+ (above kernel KZP $001A–$0027 and cc65 ZP $0000–$0019)
# RAM: $A000–$B7FF (~6 KB, below $B800 I/O region)

SYMBOLS {
    __STARTADDR__: type = weak, value = $A000;
    __STARTUP__:   type = import;
    __STACKSIZE__: type = weak, value = $0200;
}

MEMORY {
    ZP:       file = "",  define = yes, start = $0042, size = $001A;
    CPUSTACK: file = "",               start = $0140, size = $0040;
    RAM:      file = %O, define = yes, start = __STARTADDR__,
                                       size = $B800 - __STACKSIZE__ - __STARTADDR__;
}

SEGMENTS {
    ZEROPAGE: load = ZP,     type = zp;
    STARTUP:  load = RAM,    type = ro,  define   = yes;
    LOWCODE:  load = RAM,    type = ro,  optional = yes;
    ONCE:     load = RAM,    type = ro,  optional = yes;
    CODE:     load = RAM,    type = ro,  define   = yes;
    RODATA:   load = RAM,    type = ro,  define   = yes;
    DATA:     load = RAM,    type = rw,  define   = yes;
    BSS:      load = RAM,    type = bss, define   = yes;
}

FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
